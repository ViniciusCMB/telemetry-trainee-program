<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Semana 1</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', sans-serif; background: #0d1117; color: #e6edf3; padding: 40px 24px; }
.quiz-container { max-width: 720px; margin: 0 auto; }
h1 { font-size: 28px; margin-bottom: 8px; }
.subtitle { color: #8b949e; margin-bottom: 32px; }
.question { background: #1c2333; border: 1px solid #30363d; border-radius: 8px; padding: 20px; margin-bottom: 16px; }
.question h3 { font-size: 16px; margin-bottom: 12px; color: #e6edf3; }
.question-number { color: #ff6b35; font-weight: 600; margin-right: 8px; }
.options { display: flex; flex-direction: column; gap: 8px; }
.option { background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 10px 14px; cursor: pointer; transition: all 0.15s; color: #e6edf3; font-size: 14px; }
.option:hover { border-color: #ff6b35; }
.option.selected { border-color: #ff6b35; background: rgba(255,107,53,0.1); }
.option.correct { border-color: #2ea043; background: rgba(46,160,67,0.15); }
.option.incorrect { border-color: #da3633; background: rgba(218,54,51,0.15); }
.option.disabled { pointer-events: none; opacity: 0.7; }
.option.show-correct { border-color: #2ea043; background: rgba(46,160,67,0.1); }
.feedback { margin-top: 8px; font-size: 13px; padding: 6px 10px; border-radius: 4px; display: none; }
.feedback.correct-fb { display: block; background: rgba(46,160,67,0.1); color: #2ea043; }
.feedback.incorrect-fb { display: block; background: rgba(218,54,51,0.1); color: #da3633; }
.score-bar { position: sticky; top: 0; background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 16px 20px; margin-bottom: 24px; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
.score-text { font-size: 16px; font-weight: 600; }
.reset-btn { background: #ff6b35; color: #fff; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; }
.reset-btn:hover { background: #ff8c5a; }
.show-answers-btn { background: transparent; color: #ff6b35; border: 1px solid #ff6b35; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; }
.true-false { display: flex; gap: 12px; }
.true-false .option { flex: 1; text-align: center; }
.short-answer { background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 12px; color: #e6edf3; font-size: 14px; width: 100%; margin-top: 8px; }
.answer-reveal { margin-top: 12px; padding: 10px 14px; background: rgba(255,107,53,0.1); border: 1px solid #ff6b35; border-radius: 6px; display: none; font-size: 14px; color: #ff6b35; }
</style>
</head>
<body>
<div class="quiz-container">
  <h1>Quiz — Semana 1: Python básico</h1>
  <p class="subtitle">Selecione as respostas. O feedback é imediato.</p>

  <div class="score-bar" id="scoreBar">
    <span class="score-text" id="scoreText">0/0 — 0%</span>
    <div style="display:flex;gap:8px">
      <button class="reset-btn" onclick="resetQuiz()">Reiniciar</button>
      <button class="show-answers-btn" onclick="showAnswers()">Mostrar Respostas</button>
    </div>
  </div>

  <div id="questionsContainer"></div>
</div>

<script>
const questions = [
  { q: 'Qual função do módulo <code>csv</code> é mais adequada para ler um arquivo CSV onde a primeira linha contém os nomes das colunas?', type: 'mc', options: ['a) <code>csv.reader()</code>', 'b) <code>csv.DictReader()</code>', 'c) <code>csv.writer()</code>', 'd) <code>csv.DictWriter()</code>'], correct: 1, explanation: '' },
  { q: 'O bloco <code>try/except</code> em Python só pode capturar um tipo de exceção por vez.', type: 'tf', options: ['Verdadeiro', 'Falso'], correct: 1, explanation: 'é possível capturar múltiplos tipos com <code>except (Tipo1, Tipo2):</code> ou com múltiplos blocos <code>except</code>.' },
  { q: 'Como você calcularia a média de uma lista de números chamada <code>valores</code> em Python? Escreva o código.', type: 'short', options: [], correct: '<code>sum(valores) / len(valores)</code>' },
  { q: 'Ao abrir um arquivo CSV para leitura, qual modo de abertura é o mais indicado?', type: 'mc', options: ['a) <code>"w"</code>', 'b) <code>"a"</code>', 'c) <code>"r"</code>', 'd) <code>"rb"</code>'], correct: 2, explanation: '' },
  { q: 'Qual função da biblioteca <code>matplotlib</code> é usada para criar um gráfico de linha simples?', type: 'mc', options: ['a) <code>plt.bar()</code>', 'b) <code>plt.scatter()</code>', 'c) <code>plt.plot()</code>', 'd) <code>plt.hist()</code>'], correct: 2, explanation: '' },
  { q: 'Escreva um trecho de código que tenta abrir o arquivo <code>dados.csv</code> e, caso ele não exista, imprime "Arquivo não encontrado".', type: 'short', options: [], correct: 'try:<br>&nbsp;&nbsp;with open("dados.csv", "r") as arquivo:<br>&nbsp;&nbsp;&nbsp;&nbsp;print("Arquivo aberto com sucesso")<br>except FileNotFoundError:<br>&nbsp;&nbsp;print("Arquivo não encontrado")' },
  { q: 'A função <code>max()</code> em Python pode ser usada tanto com listas de números quanto com listas de strings.', type: 'tf', options: ['Verdadeiro', 'Falso'], correct: 0, explanation: 'strings também são ordenáveis lexicograficamente.' },
  { q: 'O que a função <code>plt.show()</code> faz?', type: 'mc', options: ['a) Salva o gráfico em um arquivo', 'b) Exibe o gráfico na tela', 'c) Fecha todas as figuras abertas', 'd) Limpa a figura atual'], correct: 1, explanation: '' },
  { q: 'Dado um <code>DictReader</code>, como acessar o valor da coluna <code>"temperatura"</code> da primeira linha?', type: 'short', options: [], correct: '<code>next(reader)["temperatura"]</code> (onde <code>reader</code> é o objeto <code>DictReader</code>)' }
];

let userAnswers = {};
let revealed = false;

function renderQuestions() {
  const container = document.getElementById('questionsContainer');
  container.innerHTML = '';

  questions.forEach((q, i) => {
    const div = document.createElement('div');
    div.className = 'question';
    div.id = `q${i}`;

    let optionsHtml = '';

    if (q.type === 'tf') {
      optionsHtml = `<div class="options true-false" id="opts${i}">`;
      q.options.forEach((opt, j) => {
        optionsHtml += `<div class="option" data-q="${i}" data-opt="${j}" onclick="selectOption(${i},${j})">${opt}</div>`;
      });
      optionsHtml += `</div>`;
    } else if (q.type === 'short') {
      optionsHtml = `<textarea class="short-answer" rows="2" placeholder="Digite sua resposta..." oninput="trackShortAnswer(${i}, this.value)"></textarea>`;
      optionsHtml += `<div class="answer-reveal" id="reveal${i}"><strong>Resposta:</strong> ${q.correct}</div>`;
    } else {
      optionsHtml = `<div class="options" id="opts${i}">`;
      q.options.forEach((opt, j) => {
        optionsHtml += `<div class="option" data-q="${i}" data-opt="${j}" onclick="selectOption(${i},${j})">${opt}</div>`;
      });
      optionsHtml += `</div>`;
    }

    div.innerHTML = `
      <h3><span class="question-number">${i+1}.</span> ${q.q}</h3>
      ${optionsHtml}
      <div class="feedback" id="fb${i}"></div>
    `;

    container.appendChild(div);
  });

  updateScore();
}

function selectOption(qIdx, optIdx) {
  if (revealed) return;

  const q = questions[qIdx];
  const options = document.querySelectorAll(`#opts${qIdx} .option`);

  options.forEach(o => {
    o.classList.remove('selected', 'correct', 'incorrect');
  });

  options[optIdx].classList.add('selected');

  const fb = document.getElementById(`fb${qIdx}`);
  const isCorrect = optIdx === q.correct;

  if (isCorrect) {
    options[optIdx].classList.add('correct');
    fb.className = 'feedback correct-fb';
    fb.textContent = '✅ Correto!' + (q.explanation ? ' ' + q.explanation : '');
  } else {
    options[optIdx].classList.add('incorrect');
    options[q.correct].classList.add('correct');
    fb.className = 'feedback incorrect-fb';
    fb.textContent = '❌ Incorreto. ' + (q.explanation || '');
  }

  options.forEach(o => o.classList.add('disabled'));
  userAnswers[qIdx] = optIdx;
  updateScore();
}

function trackShortAnswer(qIdx, value) {
  userAnswers[qIdx] = value;
}

function updateScore() {
  let correct = 0;
  let answered = 0;

  questions.forEach((q, i) => {
    if (userAnswers[i] !== undefined) {
      answered++;
      if (q.type === 'short') {
      } else if (userAnswers[i] === q.correct) {
        correct++;
      }
    }
  });

  const pct = answered > 0 ? Math.round(correct / answered * 100) : 0;
  document.getElementById('scoreText').textContent = `${correct}/${answered} — ${pct}%`;
}

function showAnswers() {
  revealed = true;
  questions.forEach((q, i) => {
    const fb = document.getElementById(`fb${i}`);
    if (q.type === 'short') {
      const reveal = document.getElementById(`reveal${i}`);
      if (reveal) reveal.style.display = 'block';
    } else if (userAnswers[i] === undefined) {
      const opts = document.querySelectorAll(`#opts${i} .option`);
      opts[q.correct].classList.add('show-correct');
      opts.forEach(o => o.classList.add('disabled'));
      fb.className = 'feedback correct-fb';
      fb.textContent = 'Resposta: ' + q.options[q.correct] + (q.explanation ? ' — ' + q.explanation : '');
    }
  });
}

function resetQuiz() {
  userAnswers = {};
  revealed = false;
  document.querySelectorAll('.feedback').forEach(el => {
    el.className = 'feedback';
    el.textContent = '';
  });
  document.querySelectorAll('.option').forEach(el => {
    el.classList.remove('selected', 'correct', 'incorrect', 'disabled', 'show-correct');
  });
  document.querySelectorAll('.answer-reveal').forEach(el => {
    el.style.display = 'none';
  });
  document.querySelectorAll('.short-answer').forEach(el => {
    el.value = '';
  });
  updateScore();
}

renderQuestions();
</script>
</body>
</html>
